resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
resolver_timeout 5s;

server {
    listen 80;
    server_name sater.test pma.sater.test mail.sater.test;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sater.test;

    ssl_certificate /etc/nginx/ssl/sater.test.crt;
    ssl_certificate_key /etc/nginx/ssl/sater.test.key;

    charset utf-8;
    root /var/www/html;
    index index.php index.html index.htm;

    location ~ /\. {
        deny all;
    }

    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    client_max_body_size 128M;

    location ~* \.(png|jpe?g|gif|webp|avif)$ {
        expires 24h;
        log_not_found off;
        try_files $uri $uri/ @production;
    }

    location ~* \.(mp4|webm|ogg)$ {
        expires 24h;
        log_not_found off;
        try_files $uri $uri/ @production;
    }

    location ~* \.(svg|svgz|eot|ttf|woff|woff2|otf|ico)$ {
        expires 24h;
        log_not_found off;
        try_files $uri $uri/ @production;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    rewrite ^/wp-admin$ $scheme://$host$uri/ permanent;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 16 128k;
        fastcgi_busy_buffers_size 256k;
    }

    location @production {
        proxy_pass https://sater.se$request_uri;
        proxy_set_header Host sater.se;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
}

server {
    listen 443 ssl;
    server_name pma.sater.test;

    ssl_certificate /etc/nginx/ssl/sater.test.crt;
    ssl_certificate_key /etc/nginx/ssl/sater.test.key;

    location / {
        proxy_pass http://phpmyadmin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name mail.sater.test;

    ssl_certificate /etc/nginx/ssl/sater.test.crt;
    ssl_certificate_key /etc/nginx/ssl/sater.test.key;

    location / {
        proxy_pass http://mailpit:8025;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
