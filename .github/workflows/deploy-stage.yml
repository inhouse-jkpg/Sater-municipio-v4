name: Build and deploy stage, beta, test release.

on:
  workflow_dispatch:
  push:
    branches: [stage, beta, test]
    paths-ignore:
      - .github/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: "Guard: composer.local.json must be empty in CI"
      run: |
        php -r '$j=json_decode(file_get_contents("composer.local.json"), true); if (!is_array($j)) {fwrite(STDERR,"composer.local.json is not valid JSON\n"); exit(1);} $req=$j["require"]??[]; if (!is_array($req)) {fwrite(STDERR,"composer.local.json: require must be an object\n"); exit(1);} if (count($req)!==0) {fwrite(STDERR,"composer.local.json must have an empty require block in CI\n"); exit(1);}'

    - uses: inhouse-jkpg/municipio-deploy/4.0@2963e5514908eaa416b88f27de6e9b7c8b073740
      with:
        deploy-host: ${{ secrets.DEPLOY_REMOTE_HOST_STAGE }}
        deploy-port: ${{ secrets.DEPLOY_REMOTE_PORT_STAGE }}
        deploy-host-path: ${{ secrets.DEPLOY_REMOTE_PATH_STAGE  }}
        deploy-host-backup-path: ${{ secrets.DEPLOY_REMOTE_BACKUP_DIR_STAGE }}
        deploy-host-user: ${{ secrets.DEPLOY_REMOTE_USER_STAGE }}
        deploy-host-user-key: ${{ secrets.DEPLOY_KEY_STAGE }}
        deploy-host-web-server-user: ${{ secrets.WEB_SERVER_USER_STAGE }}
        deploy-host-pagecache-path: ${{ secrets.DEPLOY_LS_PAGECACHE_PATH_STAGE }}
        php-version: ${{ secrets.PHP_VERSION }}
        kill-lsphp: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        acf-url: ${{ secrets.ACF_URL }}